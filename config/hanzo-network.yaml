web:
  port: 8080

storage:
  type: sqlite
  path: /data/status.db

ui:
  title: "Hanzo Network Status"
  description: "Real-time blockchain and web3 infrastructure health"
  header: "Status"
  logo: "/brands/hanzo/logo.svg"
  link: "https://hanzo.network"
  dark-mode: true
  favicon:
    default: "/brands/hanzo/favicon.svg"
    size16x16: "/brands/hanzo/favicon-16.png"
    size32x32: "/brands/hanzo/favicon-32.png"
  buttons:
    - name: "Explorer"
      link: "https://explore-hanzo.lux.network"
    - name: "Docs"
      link: "https://docs.hanzo.ai"
    - name: "GitHub"
      link: "https://github.com/hanzoai"

endpoints:

  # ═══════════════════════════════════════════════
  # MAINNET
  # ═══════════════════════════════════════════════

  - name: "Explorer"
    group: "Mainnet"
    url: "https://explore-hanzo.lux.network"
    interval: 60s
    conditions:
      - "[STATUS] == any(200, 302)"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 720h"

  - name: "RPC (Hanzo Chain)"
    group: "Mainnet"
    url: "https://api.lux.network/mainnet/ext/bc/2GiQb73CeJESjc4omFv2YtQHZrRgJf25NXPzAr5J6UNHRcDV2F/rpc"
    method: POST
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
    headers:
      Content-Type: application/json
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
      - "[BODY].result != null"

  # ═══════════════════════════════════════════════
  # TESTNET
  # ═══════════════════════════════════════════════

  - name: "RPC (Hanzo Testnet)"
    group: "Testnet"
    url: "https://api.lux.network/testnet/ext/bc/2wbYEFh7ELuovqXhyYeCLvweZrcEgNUoZVJUAtw145qTVAUJxE/rpc"
    method: POST
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
    headers:
      Content-Type: application/json
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
      - "[BODY].result != null"

  # ═══════════════════════════════════════════════
  # SERVICES
  # ═══════════════════════════════════════════════

  - name: "Exchange"
    group: "Services"
    url: "https://lux.exchange"
    interval: 60s
    conditions:
      - "[STATUS] == any(200, 302)"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 720h"

  - name: "Bridge"
    group: "Services"
    url: "https://bridge.lux.network"
    interval: 60s
    conditions:
      - "[STATUS] == any(200, 302)"
      - "[RESPONSE_TIME] < 5000"
      - "[CERTIFICATE_EXPIRATION] > 720h"

  - name: "MPC"
    group: "Services"
    url: "https://mpc.lux.network"
    interval: 60s
    conditions:
      - "[STATUS] == any(200, 302)"
      - "[RESPONSE_TIME] < 3000"
      - "[CERTIFICATE_EXPIRATION] > 720h"

  # ═══════════════════════════════════════════════
  # WEB
  # ═══════════════════════════════════════════════

  - name: "hanzo.ai"
    group: "Web"
    url: "https://hanzo.ai"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
      - "[CERTIFICATE_EXPIRATION] > 720h"

  - name: "docs.hanzo.ai"
    group: "Web"
    url: "https://docs.hanzo.ai"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
      - "[CERTIFICATE_EXPIRATION] > 720h"
