apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hanzo-network

resources:
  - namespace.yaml
  - ../base
  - ingress.yaml

configMapGenerator:
  - name: status-config
    files:
      - config.yaml=../../config/hanzo-network.yaml

generatorOptions:
  disableNameSuffixHash: true
