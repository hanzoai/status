apiVersion: hanzo.ai/v1alpha1
kind: IngressRoute
metadata:
  name: status-network
  namespace: hanzo-network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`status.hanzo.network`)
      kind: Rule
      services:
        - name: status
          port: 80
  tls:
    certResolver: letsencrypt
